server:
  port: ${MANAGEMENT_PORT:8082}

spring:
  application:
    name: trypto-engine
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:trypto}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true
        useLocalSessionState: true
        cacheServerConfiguration: true
        cacheResultSetMetadata: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 1
        max-concurrency: 1
        prefetch: 64
        acknowledge-mode: manual

engine:
  wal:
    dir: ${ENGINE_WAL_DIR:./wal}
    fsync-mode: per-event
    checkpoint-interval-events: ${ENGINE_WAL_CHECKPOINT_INTERVAL:1000}
  inbox:
    queue: engine.inbox
  publisher:
    fanout-exchange: order.filled.notification

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
