services:
  engine:
    image: ${ENGINE_IMAGE:-kimsehee98/trypto-engine:v1}
    pull_policy: always
    networks:
      - trypto-net
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - engine-wal:/wal
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: trypto
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: 1234
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      ENGINE_WAL_DIR: /wal
      MANAGEMENT_PORT: "8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 120s

volumes:
  engine-wal:
